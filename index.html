<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Shæwrakan — Dictionary</title>
<meta name="description" content="A dictionary of Shæwrakan, a constructed language with a Germanic/Slavic feel.">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link rel="icon" href="favicon.ico" sizes="any">
<link rel="icon" type="image/png" sizes="32x32" href="favicon-32.png">
<link rel="apple-touch-icon" sizes="180x180" href="apple-touch-icon.png">
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,500;9..144,600;9..144,700&family=Outfit:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#0c0d11; --surface:#15171e; --surface-2:#1c1f28;
    --border:#2a2e3a; --text:#e9eaf0; --muted:#8b90a0;
    --ac:#a98cf0; --ac-soft:rgba(169,140,240,.13); --ac-line:rgba(169,140,240,.42);
    --ac-glow:rgba(169,140,240,.25);
    --formal:#5f9df2; --formal-soft:rgba(95,157,242,.13); --formal-line:rgba(95,157,242,.4);
    --informal:#6fcf97; --informal-soft:rgba(111,207,151,.13); --informal-line:rgba(111,207,151,.4);
    --neutral:#8b90a0;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  html{scroll-behavior:smooth}
  body{
    background:var(--bg); color:var(--text);
    font-family:'Outfit',sans-serif; line-height:1.55; min-height:100vh;
    background-image:
      radial-gradient(circle at 15% -5%, rgba(169,140,240,.10), transparent 45%),
      radial-gradient(circle at 90% 5%, rgba(169,140,240,.05), transparent 40%);
    background-attachment:fixed;
  }
  .wrap{max-width:920px; margin:0 auto; padding:0 20px}

  header{padding:54px 0 26px; text-align:center}
  .logo{font-family:'Fraunces',serif; font-weight:700; font-size:clamp(40px,8vw,68px);
    letter-spacing:-.03em; line-height:1; background:linear-gradient(180deg,#fff,#c9bdf5);
    -webkit-background-clip:text; background-clip:text; color:transparent;}
  .tagline{color:var(--muted); margin-top:12px; font-size:15px}
  .tagline b{color:var(--ac); font-weight:500}

  .searchbar{position:sticky; top:0; z-index:20; padding:16px 0 14px; background:transparent;}
  .search-inner{position:relative}
  #search{width:100%; padding:15px 48px 15px 18px; font-size:16px; font-family:inherit;
    color:var(--text); background:var(--surface); border:1px solid var(--border);
    border-radius:14px; outline:none; transition:border-color .2s, box-shadow .2s;}
  #search::placeholder{color:var(--muted)}
  #search:focus{border-color:var(--ac-line)}
  .search-icon{position:absolute; right:16px; top:50%; transform:translateY(-50%); color:var(--muted); pointer-events:none}

  .filters{display:flex; gap:8px; flex-wrap:wrap; padding:4px 0 18px}
  .chip{font-size:12.5px; padding:6px 13px; border-radius:20px; cursor:pointer;
    background:var(--surface); border:1px solid var(--border); color:var(--muted);
    transition:all .15s; white-space:nowrap; user-select:none;}
  .chip:hover{color:var(--text); border-color:var(--ac-line)}
  .chip.active{background:var(--ac-soft); color:var(--ac); border-color:var(--ac-line)}
  .count{color:var(--muted); font-size:13px; padding:0 0 14px}

  .grid{display:flex; flex-direction:column; gap:13px; padding-bottom:60px}
  .card{background:var(--surface); border:1px solid var(--border); border-radius:15px;
    padding:18px 20px; transition:border-color .2s, transform .15s; cursor:pointer;
    animation:rise .4s ease backwards;}
  .card:hover{border-color:var(--ac-line); transform:translateY(-1px)}
  @keyframes rise{from{opacity:0; transform:translateY(8px)} to{opacity:1}}
  .row1{display:flex; align-items:baseline; gap:12px; flex-wrap:wrap}
  .word{font-family:'Fraunces',serif; font-weight:600; font-size:31px; color:var(--ac);
    letter-spacing:-.01em; line-height:1.1; text-shadow:0 0 24px var(--ac-glow)}
  .eng{font-size:16px; color:var(--text)}
  .tags{display:flex; gap:7px; margin:11px 0 0; flex-wrap:wrap; align-items:center}
  .tag{font-size:11px; padding:3px 10px; border-radius:20px; font-weight:500; letter-spacing:.02em}
  .pos{background:var(--ac-soft); color:var(--ac); border:1px solid var(--ac-line)}
  .cat{background:transparent; color:var(--muted); border:1px solid var(--border); cursor:pointer}
  .cat:hover{color:var(--text); border-color:var(--ac-line)}
  .form-tag{display:inline-flex; align-items:center; gap:5px}
  .form-tag::before{content:""; width:6px; height:6px; border-radius:50%}
  .form-Formal{background:var(--formal-soft); color:var(--formal); border:1px solid var(--formal-line)}
  .form-Formal::before{background:var(--formal)}
  .form-Informal{background:var(--informal-soft); color:var(--informal); border:1px solid var(--informal-line)}
  .form-Informal::before{background:var(--informal)}
  .form-Neutral{background:transparent; color:var(--neutral); border:1px solid var(--border)}
  .form-Neutral::before{background:var(--neutral)}
  .notes{font-size:13.5px; color:var(--muted); margin-top:11px}
  .ex{border-left:2.5px solid var(--ac-line); padding:5px 0 5px 13px; margin-top:12px}
  .ex-sh{font-family:'Fraunces',serif; font-size:15.5px; color:var(--text)}
  .ex-en{font-size:13px; color:var(--muted); font-style:italic; margin-top:2px}
  .more-ex{font-size:12px; color:var(--ac); margin-top:8px}
  mark{background:var(--ac-soft); color:var(--ac); border-radius:3px; padding:0 2px}
  .hl{color:var(--ac); font-weight:600; text-shadow:0 0 16px var(--ac-glow)}

  .empty{text-align:center; color:var(--muted); padding:60px 0; font-size:15px}
  .loading{text-align:center; color:var(--muted); padding:60px 0}
  footer{text-align:center; color:var(--muted); font-size:12.5px; padding:30px 0 50px; border-top:1px solid var(--border)}

  .overlay{position:fixed; inset:0; background:rgba(6,7,10,.78); backdrop-filter:blur(4px);
    z-index:100; display:none; align-items:flex-start; justify-content:center; padding:40px 20px; overflow-y:auto;}
  .overlay.open{display:flex; animation:fade .2s ease}
  @keyframes fade{from{opacity:0} to{opacity:1}}
  .modal{background:var(--surface); border:1px solid var(--ac-line); border-radius:20px;
    max-width:640px; width:100%; padding:34px 34px 30px; position:relative;
    box-shadow:0 30px 80px rgba(0,0,0,.5), 0 0 60px var(--ac-glow);
    animation:pop .25s cubic-bezier(.2,.8,.3,1.1);}
  @keyframes pop{from{opacity:0; transform:translateY(14px) scale(.98)} to{opacity:1; transform:none}}
  .close{position:absolute; top:16px; right:18px; width:34px; height:34px; border-radius:9px;
    background:var(--surface-2); border:1px solid var(--border); color:var(--muted);
    font-size:20px; cursor:pointer; display:flex; align-items:center; justify-content:center; transition:all .15s}
  .close:hover{color:var(--text); border-color:var(--ac-line)}
  .m-word{font-family:'Fraunces',serif; font-weight:700; font-size:46px; color:var(--ac);
    letter-spacing:-.02em; line-height:1.05; text-shadow:0 0 30px var(--ac-glow)}
  .m-eng{font-size:19px; color:var(--text); margin-top:4px}
  .m-tags{display:flex; gap:8px; margin:16px 0; flex-wrap:wrap; align-items:center}
  .m-section{margin-top:22px}
  .m-label{font-size:11px; letter-spacing:.08em; text-transform:uppercase; color:var(--muted); margin-bottom:8px}
  .m-notes{font-size:14.5px; color:var(--text); line-height:1.6}
  .m-ex{border-left:3px solid var(--ac-line); padding:8px 0 8px 15px; margin-bottom:12px;
    background:linear-gradient(90deg,var(--ac-soft),transparent); border-radius:0 8px 8px 0}
  .m-ex-sh{font-family:'Fraunces',serif; font-size:18px; color:var(--text); line-height:1.4}
  .m-ex-en{font-size:14px; color:var(--muted); font-style:italic; margin-top:4px}
  .m-noex{font-size:14px; color:var(--muted); font-style:italic}
</style>
</head>
<body>
<div class="wrap">
  <header>
    <div class="logo">Shæwrakan Dictionary & Lexicon</div>
    <div class="tagline">A dictionary of the <b>Shæwrakan</b> language · <span id="total">—</span> words</div>
  </header>

  <div class="searchbar">
    <div class="search-inner">
      <input id="search" type="text" placeholder="Search Shæwrakan or English…" autocomplete="off" spellcheck="false">
      <span class="search-icon">⌕</span>
    </div>
  </div>

  <div class="filters" id="filters"></div>
  <div class="count" id="count"></div>
  <div class="grid" id="grid"><div class="loading">Loading lexicon…</div></div>

  <footer>Shæwrakan dictionary · built for GitHub Pages · static &amp; secure</footer>
</div>

<div class="overlay" id="overlay">
  <div class="modal" id="modal" role="dialog" aria-modal="true">
    <button class="close" id="closeBtn" aria-label="Close">×</button>
    <div id="modalBody"></div>
  </div>
</div>

<script>
"use strict";
let LEX = [];
let activeCat = "All";
let query = "";
const $ = id => document.getElementById(id);

function esc(s){
  return String(s ?? "")
    .replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;")
    .replace(/"/g,"&quot;").replace(/'/g,"&#39;");
}
function highlight(escaped, q){
  if(!q) return escaped;
  const safe = q.replace(/[.*+?^${}()|[\]\\]/g,"\\$&");
  return escaped.replace(new RegExp("("+safe+")","gi"), "<mark>$1</mark>");
}
// *word* -> highlighted span. Escapes first so the data itself can't inject HTML.
function renderExample(text){
  return esc(text).replace(/\*([^*]+)\*/g, '<span class="hl">$1</span>');
}
function firstExample(e){
  return (Array.isArray(e.examples) && e.examples.length) ? e.examples[0] : null;
}

function render(){
  const grid = $("grid");
  const q = query.trim().toLowerCase();
  let list = LEX.map((e,idx)=>{ e._i = idx; return e; }).filter(e=>{
    const catOk = activeCat==="All" || e.category===activeCat;
    if(!catOk) return false;
    if(!q) return true;
    return (e.word||"").toLowerCase().includes(q)
        || (e.english||"").toLowerCase().includes(q)
        || (e.notes||"").toLowerCase().includes(q);
  });

  $("count").textContent = list.length + (list.length===1?" word":" words")
    + (activeCat!=="All" ? " in "+activeCat : "") + (q ? ' matching "'+query.trim()+'"' : "");

  if(!list.length){ grid.innerHTML = '<div class="empty">No words found. Try a different search or category.</div>'; return; }

  grid.innerHTML = list.map((e,i)=>{
    const word = highlight(esc(e.word), q);
    const eng  = highlight(esc(e.english), q);
    const fm = e.formality || "Neutral";
    const notes = e.notes ? '<div class="notes">'+highlight(esc(e.notes), q)+'</div>' : '';
    const ex0 = firstExample(e);
    const ex = ex0 ? '<div class="ex"><div class="ex-sh">'+renderExample(ex0.sh)+'</div>'
                + (ex0.en?'<div class="ex-en">'+renderExample(ex0.en)+'</div>':'') +'</div>' : '';
    const n = Array.isArray(e.examples)?e.examples.length:0;
    const extra = n>1 ? '<div class="more-ex">+'+(n-1)+' more example'+(n-1>1?'s':'')+' — tap to view</div>' : '';
    return '<div class="card" data-open="'+e._i+'" style="animation-delay:'+Math.min(i*18,360)+'ms">'
      + '<div class="row1"><span class="word">'+word+'</span><span class="eng">'+eng+'</span></div>'
      + '<div class="tags"><span class="tag pos">'+esc(e.pos)+'</span>'
      + '<span class="tag cat" data-cat="'+esc(e.category)+'">'+esc(e.category)+'</span>'
      + '<span class="tag form-tag form-'+esc(fm)+'">'+esc(fm)+'</span></div>'
      + notes + ex + extra + '</div>';
  }).join("");
}

function buildFilters(){
  const cats = ["All", ...Array.from(new Set(LEX.map(e=>e.category))).sort((a,b)=>a.localeCompare(b))];
  $("filters").innerHTML = cats.map(c=>
    '<span class="chip'+(c===activeCat?' active':'')+'" data-cat="'+esc(c)+'">'+esc(c)+'</span>'
  ).join("");
}
function setCat(c){
  activeCat = (c === activeCat) ? "All" : c;   // toggle back to All
  buildFilters(); render();
  window.scrollTo({top:0,behavior:"smooth"});
}

function openModal(idx){
  const e = LEX[idx]; if(!e) return;
  const fm = e.formality || "Neutral";
  const exs = Array.isArray(e.examples) ? e.examples : [];
  const exHtml = exs.length
    ? exs.map(x=>'<div class="m-ex"><div class="m-ex-sh">'+renderExample(x.sh)+'</div>'
        + (x.en?'<div class="m-ex-en">'+renderExample(x.en)+'</div>':'') +'</div>').join("")
    : '<div class="m-noex">No example sentences yet.</div>';
  $("modalBody").innerHTML =
      '<div class="m-word">'+esc(e.word)+'</div>'
    + '<div class="m-eng">'+esc(e.english)+'</div>'
    + '<div class="m-tags"><span class="tag pos">'+esc(e.pos)+'</span>'
    + '<span class="tag cat" data-cat="'+esc(e.category)+'">'+esc(e.category)+'</span>'
    + '<span class="tag form-tag form-'+esc(fm)+'">'+esc(fm)+'</span></div>'
    + (e.notes ? '<div class="m-section"><div class="m-label">Notes</div><div class="m-notes">'+esc(e.notes)+'</div></div>' : '')
    + '<div class="m-section"><div class="m-label">Example'+(exs.length>1?'s':'')+'</div>'+exHtml+'</div>';
  $("overlay").classList.add("open");
  document.body.style.overflow="hidden";
}
function closeModal(){ $("overlay").classList.remove("open"); document.body.style.overflow=""; }

document.addEventListener("click", e=>{
  const chip = e.target.closest(".chip");
  if(chip){ setCat(chip.dataset.cat); return; }
  const catTag = e.target.closest(".cat");
  if(catTag && catTag.dataset.cat){ closeModal(); setCat(catTag.dataset.cat); return; }
  const card = e.target.closest("[data-open]");
  if(card){ openModal(+card.dataset.open); return; }
});
$("closeBtn").addEventListener("click", closeModal);
$("overlay").addEventListener("click", e=>{ if(e.target===$("overlay")) closeModal(); });
document.addEventListener("keydown", e=>{ if(e.key==="Escape") closeModal(); });
$("search").addEventListener("input", e=>{ query = e.target.value; render(); });

fetch("lexicon.json")
  .then(r=>{ if(!r.ok) throw new Error(r.status); return r.json(); })
  .then(data=>{
    LEX = Array.isArray(data) ? data : [];
    $("total").textContent = LEX.length;
    buildFilters(); render();
  })
  .catch(err=>{
    $("grid").innerHTML = '<div class="empty">Could not load <code>lexicon.json</code>.<br>'
      + 'If opening locally, run a local server (see README); on GitHub Pages it loads automatically.</div>';
    console.error(err);
  });
</script>
</body>
</html>
